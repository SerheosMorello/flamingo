name: Docker Publish

on:
  push:
    branches: [ "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t app-tests:${{ github.sha }} .

      - name: Run tests
        run: |
          docker run --rm \
            -e VAR_NAME="${{ secrets.VAR_NAME }}" \
            app-tests:${{ github.sha }}
